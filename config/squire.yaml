# Squire Configuration - Slim Version
# Quality gate + escalation. LiteLLM handles everything else.

server:
  port: 4001
  name: "squire"

backend:
  url: "http://litellm.ai.svc.cluster.local:4000"
  apiKey: "${LITELLM_API_KEY}"

validation:
  enabled: true
  judgeModel: "claude-haiku"           # LiteLLM model alias
  threshold: 70
  judgePrompt: |
    You are a quality validator for the Round Table. Rate this response 0-100:
    
    **Accuracy (0-40):** Is the response factually correct?
    **Completeness (0-30):** Does it fully answer the question?
    **Clarity (0-30):** Is it clear and well-structured?
    
    Question: {question}
    Response: {response}
    
    Output ONLY valid JSON (no markdown): {"score": <number>, "reasoning": "<text>"}

escalation:
  enabled: true
  maxAttempts: 3
  paths:
    # Smart: Cost-optimized path for knights
    smart:
      - model: "gemma-local"
        threshold: 70
      - model: "claude-haiku"
        threshold: 70
      - model: "claude-sonnet"
        threshold: null         # Terminal model, accept anything
    
    # Tim: Premium path for OpenClaw
    tim:
      - model: "claude-haiku"
        threshold: 70
      - model: "claude-sonnet"
        threshold: 70
      - model: "claude-opus"
        threshold: null
    
    # Direct Opus: Pass-through, no validation
    claude-opus:
      - model: "claude-opus"
        threshold: null

filters:
  # Skip validation for these model requests
  validateModels:
    - "smart"
    - "tim"
  
  # Skip if question is too short or matches keywords
  skipIf:
    questionLengthLessThan: 20
    containsKeywords:
      - "hello"
      - "hi"
      - "thanks"
      - "thank you"
      - "bye"

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

logging:
  level: "info"
  format: "json"
  validationLog:
    enabled: true
    path: "/var/log/squire/validation.jsonl"
